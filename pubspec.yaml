name: euro_logistics_tycoon
description: Euro Logistics Tycoon — MMO экономическая стратегия по мотивам ETS2
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  provider: ^6.1.2
  go_router: ^14.8.1
  google_fonts: ^6.3.3
  latlong2: ^0.9.1
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/trucks/
    - assets/cargo/
    - assets/map_markers/
