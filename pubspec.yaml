name: shipping_manager
description: Экономическая стратегия — менеджер морских перевозок
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  provider: ^6.1.2
  go_router: ^14.8.1
  google_fonts: ^6.3.3
  fl_chart: ^0.70.2
  intl: ^0.19.0
  collection: ^1.19.0
  tuple: ^2.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ships/
