name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Copy APK with correct name
        run: cp build/app/outputs/flutter-apk/app-release.apk cyberhack-game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cyberhack-game-apk
          path: cyberhack-game.apk

      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          files: cyberhack-game.apk
          overwrite: true
          name: "CyberHack Game APK"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
